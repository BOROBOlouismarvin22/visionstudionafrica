backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

media_library:
  name: uploadcare

collections:
  - name: "portfolio"
    label: "Portfolio"
    folder: "_portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom du projet", name: "title", widget: "string"}
      - {label: "Catégorie", name: "tag", widget: "string"}
      - {label: "Description", name: "description", widget: "string"}
      - {label: "Image", name: "image", widget: "image"}

  - name: "temoignages"
    label: "Témoignages"
    folder: "_temoignages"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom", name: "name", widget: "string"}
      - {label: "Rôle", name: "role", widget: "string"}
      - {label: "Témoignage", name: "text", widget: "text"}
      - {label: "Initiales", name: "initials", widget: "string"}
